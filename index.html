<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 0;
    }

    .wrapper {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: none;
      margin: 0;
    }

    .compare {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 0;
      box-shadow: none;
      background: #f8f8f8;
    }

    .pane {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .pane iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .pane.top {
      z-index: 2;
      clip-path: inset(0 50% 0 0);
    }

    .pane.bottom {
      z-index: 1;
    }

    .divider {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 3px;
      background: #ffffff;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.15);
      z-index: 4;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .handle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(0,0,0,0.14);
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #333;
      user-select: none;
    }

    .slider {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 6;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      margin: 0;
      cursor: ew-resize;
    }

    .slider:focus {
      outline: none;
    }

    .slider::-webkit-slider-runnable-track {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
    }

    .slider::-moz-range-track {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
    }

    .slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 46px;
      height: 100vh;
      background: transparent;
      border: none;
      cursor: ew-resize;
    }

    .slider::-moz-range-thumb {
      width: 46px;
      height: 100vh;
      background: transparent;
      border: none;
      cursor: ew-resize;
    }

    @media (max-width: 900px) {
      .handle {
        width: 42px;
        height: 42px;
        font-size: 16px;
      }

      .slider::-webkit-slider-thumb {
        width: 42px;
      }

      .slider::-moz-range-thumb {
        width: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="compare" id="compare">
      <div class="pane bottom" id="bottomPane">
        <iframe
          src="https://flo.uri.sh/visualisation/27647858/embed"
          title="Flourish visualization 27647858"
          class="flourish-embed-iframe"
          frameborder="0"
          scrolling="no"
          allowfullscreen
          sandbox="allow-same-origin allow-forms allow-scripts allow-downloads allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
        </iframe>
      </div>

      <div class="pane top" id="topPane">
        <iframe
          src="https://flo.uri.sh/visualisation/27647708/embed"
          title="Flourish visualization 27647708"
          class="flourish-embed-iframe"
          frameborder="0"
          scrolling="no"
          allowfullscreen
          sandbox="allow-same-origin allow-forms allow-scripts allow-downloads allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
        </iframe>
      </div>

      <div class="divider" id="divider"></div>
      <div class="handle" id="handle">↔</div>

      <input
        class="slider"
        id="slider"
        type="range"
        min="0"
        max="100"
        value="50"
        aria-label="Swipe comparison slider"
      />
    </div>
  </div>

  <script>
    const slider = document.getElementById("slider");
    const topPane = document.getElementById("topPane");
    const divider = document.getElementById("divider");
    const handle = document.getElementById("handle");

    function updateSwipe(value) {
      topPane.style.clipPath = `inset(0 ${100 - value}% 0 0)`;
      divider.style.left = value + "%";
      handle.style.left = value + "%";
    }

    slider.addEventListener("input", (e) => {
      updateSwipe(e.target.value);
    });

    updateSwipe(50);
  </script>
</body>
</html>
``
